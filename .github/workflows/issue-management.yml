name: Issue Management

on:
  issues:
    types: [opened, edited, closed, reopened]
  issue_comment:
    types: [created]
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'

jobs:
  label-issue:
    runs-on: ubuntu-latest
    if: github.event.action == 'opened'
    steps:
      - uses: actions/checkout@v4

      - name: Label new issues
        uses: github/issue-labeler@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          enable-versioned-regex: 0

      - name: Add greeting comment
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const labels = issue.labels.map(l => l.name);
            
            let message = `👋 Thanks for opening this issue!\n\n`;
            
            if (labels.includes('data source')) {
              message += `📊 **Data Source Request**\n\n`;
              message += `We'll review this data source for:\n`;
              message += `- Data accessibility and license\n`;
              message += `- API stability\n`;
              message += `- Geographic/temporal coverage\n\n`;
              message += `Feel free to start working on this if you're interested in contributing! `;
            }
            
            if (labels.includes('bug')) {
              message += `🐛 **Bug Report**\n\n`;
              message += `We'll investigate this as soon as possible. `;
              message += `In the meantime, please provide any additional details that might help us reproduce the issue.`;
            }
            
            if (labels.includes('enhancement')) {
              message += `💡 **Feature Request**\n\n`;
              message += `Thank you for the suggestion! `;
              message += `We'll evaluate this for inclusion in a future release.`;
            }
            
            message += `\n\n---\n`;
            message += `🔔 Make sure to check our [Contributing Guide](https://github.com/${{ github.repository }}/blob/main/CONTRIBUTING.md) `;
            message += `and join our [Discussions](https://github.com/${{ github.repository }}/discussions) for community support!`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });

  stale-issues:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Mark stale issues and PRs
        uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          
          # Issue configuration
          stale-issue-message: |
            📌 This issue has been automatically marked as stale because it has not had recent activity.
            
            It will be closed in 7 days if no further activity occurs.
            
            If this issue is still relevant, please comment below to keep it open.
            
            Thank you for your contributions! 🙏
          
          close-issue-message: |
            🔒 This issue has been automatically closed due to inactivity.
            
            If you believe this issue is still relevant, please:
            1. Check if it has been resolved in recent updates
            2. Open a new issue with updated information if needed
            
            Thank you for your understanding! 🙏
          
          # PR configuration
          stale-pr-message: |
            📌 This pull request has been automatically marked as stale because it has not had recent activity.
            
            It will be closed in 7 days if no further activity occurs.
            
            If you're still working on this, please comment below to keep it open.
          
          close-pr-message: |
            🔒 This pull request has been automatically closed due to inactivity.
            
            If you'd like to continue working on this, please open a new pull request.
          
          # Timing
          days-before-stale: 30
          days-before-close: 7
          
          # Labels
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
          exempt-issue-labels: 'pinned,security,data source,help wanted,good first issue'
          exempt-pr-labels: 'pinned,work-in-progress'
          
          # Operations
          remove-stale-when-updated: true
          delete-branch: false

  issue-stats:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Update issue badges
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });
            
            const stats = {
              total: issues.length,
              bugs: issues.filter(i => i.labels.some(l => l.name === 'bug')).length,
              features: issues.filter(i => i.labels.some(l => l.name === 'enhancement')).length,
              dataSources: issues.filter(i => i.labels.some(l => l.name === 'data source')).length,
              helpWanted: issues.filter(i => i.labels.some(l => l.name === 'help wanted')).length
            };
            
            console.log('Issue Statistics:', stats);
            
            // You can save these stats to a file or use them elsewhere
            require('fs').writeFileSync('issue-stats.json', JSON.stringify(stats, null, 2));

      - name: Upload stats
        uses: actions/upload-artifact@v3
        with:
          name: issue-stats
          path: issue-stats.json
